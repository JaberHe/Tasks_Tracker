<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Routine" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>Routine</title>
  <script>
    const manifest = {name:"Routine",short_name:"Routine",start_url:".",display:"standalone",background_color:"#0a0a0f",theme_color:"#0a0a0f",icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%230a0a0f'/%3E%3Ccircle cx='256' cy='256' r='160' fill='none' stroke='%23e8d5a3' stroke-width='24'/%3E%3Ctext x='256' y='310' text-anchor='middle' font-size='160' fill='%23e8d5a3' font-family='serif'%3E%E2%9C%93%3C/text%3E%3C/svg%3E",sizes:"512x512",type:"image/svg+xml",purpose:"any maskable"}]};
    const mb=new Blob([JSON.stringify(manifest)],{type:"application/json"});
    const ml=document.createElement("link");ml.rel="manifest";ml.href=URL.createObjectURL(mb);document.head.appendChild(ml);
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:rgba(255,255,255,0.07);--text:#f0ece0;--text-dim:#6a6860;--accent:#e8d5a3;--green:#5cdb8a;--orange:#f0a04b;--red:#e05c5c;--gold:#e8d5a3;}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overscroll-behavior:none;}
    body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;min-height:100dvh;}
    header{padding:calc(env(safe-area-inset-top) + 24px) 24px 20px;background:var(--bg);position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border);}
    header h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;letter-spacing:-0.5px;color:var(--accent);}
    header p{font-size:13px;color:var(--text-dim);margin-top:3px;font-weight:300;letter-spacing:0.3px;}
    main{flex:1;overflow-y:auto;padding:16px 16px 120px;-webkit-overflow-scrolling:touch;}
    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;text-align:center;gap:12px;opacity:0;animation:fadeIn 0.6s 0.2s ease forwards;}
    .empty-icon{font-size:52px;opacity:0.25;}
    .empty h2{font-family:'Playfair Display',serif;font-size:20px;font-weight:400;color:var(--text-dim);}
    .empty p{font-size:14px;color:var(--text-dim);opacity:0.6;line-height:1.5;}
    #task-list{display:flex;flex-direction:column;gap:10px;}
    .card{background:var(--surface);border-radius:18px;border:1px solid var(--border);padding:16px 16px 16px 20px;display:grid;grid-template-columns:1fr auto;grid-template-rows:auto auto;gap:0 12px;align-items:stretch;position:relative;overflow:hidden;transition:transform 0.15s ease;animation:slideIn 0.35s ease both;}
    .card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:18px 0 0 18px;transition:background 0.4s ease;}
    .card.u-gold{background:color-mix(in srgb,var(--surface) 92%,rgba(232,213,163,0.15));}
    .card.u-green{background:color-mix(in srgb,var(--surface) 92%,rgba(92,219,138,0.12));}
    .card.u-orange{background:color-mix(in srgb,var(--surface) 92%,rgba(240,160,75,0.12));}
    .card.u-red{background:color-mix(in srgb,var(--surface) 92%,rgba(224,92,92,0.12));}
    .card.u-gold::before{background:var(--gold);}
    .card.u-green::before{background:var(--green);}
    .card.u-orange::before{background:var(--orange);}
    .card.u-red::before{background:var(--red);}
    .card:active{transform:scale(0.985);}
    .card-info{grid-column:1;grid-row:1;padding-bottom:10px;}
    .card-name{font-size:15px;font-weight:500;color:var(--text);letter-spacing:-0.1px;line-height:1.3;}
    .card-threshold{font-size:10.5px;color:var(--text-dim);font-weight:300;margin-top:3px;letter-spacing:0.2px;}
    .card-time{grid-column:1;grid-row:2;display:flex;flex-direction:column;gap:3px;}
    .days-row{display:flex;align-items:baseline;gap:5px;}
    .days-number{font-family:'Playfair Display',serif;font-size:52px;font-weight:700;line-height:1;transition:color 0.4s ease;}
    .days-unit{font-size:11px;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);}
    .chrono{font-size:11.5px;font-style:italic;font-weight:300;color:var(--text-dim);opacity:0.6;letter-spacing:0.1px;line-height:1.4;font-family:'DM Sans',sans-serif;}
    .card.u-gold .days-number{color:var(--gold);}
    .card.u-green .days-number{color:var(--green);}
    .card.u-orange .days-number{color:var(--orange);}
    .card.u-red .days-number{color:var(--red);}
    .card-actions{grid-column:2;grid-row:1/3;display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;padding:0 0 2px;}
    .btn-delete{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:18px;padding:2px;opacity:0.35;transition:opacity 0.2s;line-height:1;}
    .btn-delete:hover{opacity:0.75;}
    .btn-done{background:var(--surface2);border:1px solid var(--border);border-radius:50px;padding:10px 15px;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;color:var(--text);cursor:pointer;transition:all 0.2s ease;white-space:nowrap;}
    .btn-done:active{transform:scale(0.92);background:var(--accent);color:var(--bg);border-color:var(--accent);}
    #fab{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 28px);left:50%;transform:translateX(-50%);width:64px;height:64px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;font-size:28px;color:var(--bg);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(232,213,163,0.3),0 2px 8px rgba(0,0,0,0.4);transition:transform 0.2s ease,box-shadow 0.2s ease;z-index:100;}
    #fab:active{transform:translateX(-50%) scale(0.9);box-shadow:0 4px 16px rgba(232,213,163,0.2);}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(5px);opacity:0;pointer-events:none;transition:opacity 0.25s ease;}
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal{background:var(--surface);border-radius:28px 28px 0 0;width:100%;padding:12px 24px calc(env(safe-area-inset-bottom) + 36px);border:1px solid var(--border);border-bottom:none;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);}
    .modal-overlay.open .modal{transform:translateY(0);}
    .modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 24px;}
    .modal h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--accent);margin-bottom:18px;}
    .modal-field{margin-bottom:14px;}
    .modal-label{font-size:11px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:7px;display:block;}
    .modal input[type="text"],.modal input[type="number"]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:15px 18px;font-family:'DM Sans',sans-serif;font-size:16px;color:var(--text);outline:none;transition:border-color 0.2s;-webkit-appearance:none;}
    .modal input::placeholder{color:var(--text-dim);}
    .modal input:focus{border-color:var(--accent);}
    .threshold-row{display:flex;align-items:center;gap:10px;}
    .threshold-row input[type="number"]{width:90px;text-align:center;padding:15px 10px;flex-shrink:0;}
    .threshold-hint{font-size:12px;color:var(--text-dim);font-weight:300;line-height:1.7;flex:1;}
    .threshold-hint strong{color:var(--text);font-weight:400;}
    .urgency-preview{display:flex;gap:6px;margin-top:10px;}
    .urgency-pill{flex:1;text-align:center;border-radius:8px;padding:6px 4px;font-size:10.5px;font-weight:500;letter-spacing:0.3px;}
    .urgency-pill.p-green{background:rgba(92,219,138,0.12);color:var(--green);}
    .urgency-pill.p-orange{background:rgba(240,160,75,0.12);color:var(--orange);}
    .urgency-pill.p-red{background:rgba(224,92,92,0.12);color:var(--red);}
    .suggestions{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
    .suggestion{background:var(--surface2);border:1px solid var(--border);border-radius:50px;padding:7px 14px;font-size:13px;color:var(--text-dim);cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
    .suggestion:active{background:var(--accent);color:var(--bg);border-color:var(--accent);}
    .btn-add-confirm{width:100%;margin-top:18px;background:var(--accent);border:none;border-radius:14px;padding:17px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;color:var(--bg);cursor:pointer;transition:opacity 0.2s,transform 0.15s;}
    .btn-add-confirm:active{opacity:0.85;transform:scale(0.98);}
    @keyframes doneFlash{0%{transform:scale(1);}40%{transform:scale(0.97);}70%{transform:scale(1.02);}100%{transform:scale(1);}}
    .card.just-done{animation:doneFlash 0.4s ease;}
    @keyframes slideIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
    .card.removing{animation:slideOut 0.3s ease forwards;pointer-events:none;}
    @keyframes slideOut{to{opacity:0;transform:translateX(60px) scale(0.95);max-height:0;margin:0;padding:0;border:none;}}
  </style>
</head>
<body>
<header>
  <h1>Routine</h1>
  <p id="header-sub">Chargement…</p>
</header>
<main>
  <div id="task-list"></div>
  <div class="empty" id="empty-state" style="display:none">
    <div class="empty-icon">🌿</div>
    <h2>Aucune tâche</h2>
    <p>Appuie sur <strong>+</strong> pour ajouter<br>tes premières tâches récurrentes.</p>
  </div>
</main>
<button id="fab" aria-label="Ajouter une tâche">+</button>
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Nouvelle tâche</h2>
    <div class="modal-field">
      <label class="modal-label">Nom de la tâche</label>
      <input type="text" id="new-task-input" placeholder="Ex: Lessive, Appeler maman…" maxlength="50" autocomplete="off" />
      <div class="suggestions">
        <span class="suggestion" onclick="fillSuggestion(this)">Lessive</span>
        <span class="suggestion" onclick="fillSuggestion(this)">Changer draps</span>
        <span class="suggestion" onclick="fillSuggestion(this)">Appeler maman</span>
        <span class="suggestion" onclick="fillSuggestion(this)">Sport</span>
        <span class="suggestion" onclick="fillSuggestion(this)">Ménage</span>
        <span class="suggestion" onclick="fillSuggestion(this)">Plantes</span>
        <span class="suggestion" onclick="fillSuggestion(this)">Courses</span>
        <span class="suggestion" onclick="fillSuggestion(this)">Douche</span>
      </div>
    </div>
    <div class="modal-field">
      <label class="modal-label">Seuil de tolérance</label>
      <div class="threshold-row">
        <input type="number" id="threshold-input" value="7" min="1" max="365" />
        <div class="threshold-hint">
          🟢 <strong id="ph-green">0–7 j</strong><br>
          🟠 <strong id="ph-orange">7–14 j</strong><br>
          🔴 <strong id="ph-red">&gt;14 j</strong>
        </div>
      </div>
      <div class="urgency-preview">
        <div class="urgency-pill p-green" id="pill-green">0–7 j</div>
        <div class="urgency-pill p-orange" id="pill-orange">7–14 j</div>
        <div class="urgency-pill p-red" id="pill-red">&gt;14 j</div>
      </div>
    </div>
    <button class="btn-add-confirm" onclick="confirmAdd()">Ajouter la tâche</button>
  </div>
</div>
<script>
  const STORAGE_KEY = 'routine_tasks_v2';
  let tasks = [];
  function loadTasks(){try{tasks=JSON.parse(localStorage.getItem(STORAGE_KEY))||[];}catch{tasks=[];}}
  function saveTasks(){localStorage.setItem(STORAGE_KEY,JSON.stringify(tasks));}
  function secondsSince(iso){if(!iso)return null;return Math.max(0,Math.floor((Date.now()-new Date(iso).getTime())/1000));}
  function daysFromSec(sec){if(sec===null)return Infinity;return Math.floor(sec/86400);}
  function formatChrono(sec){
    if(sec===null)return 'jamais validé';
    const d=Math.floor(sec/86400),h=Math.floor((sec%86400)/3600),m=Math.floor((sec%3600)/60),s=sec%60;
    const p=[];
    if(d>0)p.push(d+'j');
    p.push(String(h).padStart(2,'0')+'h');
    p.push(String(m).padStart(2,'0')+'m');
    p.push(String(s).padStart(2,'0')+'s');
    return p.join(' ');
  }
  function urgencyClass(sec,threshold){
    if(sec===null)return 'u-red';
    const days=daysFromSec(sec),N=threshold||7;
    if(sec<3600)return 'u-gold';
    if(days<N)return 'u-green';
    if(days<N*2)return 'u-orange';
    return 'u-red';
  }
  function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
  function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  function render(){
    const list=document.getElementById('task-list');
    const empty=document.getElementById('empty-state');
    const sub=document.getElementById('header-sub');
    const sorted=[...tasks].sort((a,b)=>{
      const sa=secondsSince(a.lastDone)??Infinity;
      const sb=secondsSince(b.lastDone)??Infinity;
      return sb-sa;
    });
    if(tasks.length===0){sub.textContent='Aucune tâche configurée';list.innerHTML='';empty.style.display='flex';return;}
    empty.style.display='none';
    const overdue=tasks.filter(t=>{const sec=secondsSince(t.lastDone);return sec===null||daysFromSec(sec)>=(t.threshold||7)*2;}).length;
    sub.textContent=overdue>0?`${overdue} tâche${overdue>1?'s':''} en retard`:`${tasks.length} tâche${tasks.length>1?'s':''} suivie${tasks.length>1?'s':''}`;
    const existingIds=[...list.querySelectorAll('.card')].map(c=>c.dataset.id);
    const sortedIds=sorted.map(t=>t.id);
    if(JSON.stringify(existingIds)!==JSON.stringify(sortedIds)){
      list.innerHTML='';
      sorted.forEach((task,i)=>list.appendChild(buildCard(task,i)));
    } else {
      sorted.forEach(task=>patchCard(task));
    }
  }

  function buildCard(task,i){
    const sec=secondsSince(task.lastDone);
    const days=daysFromSec(sec);
    const cls=urgencyClass(sec,task.threshold);
    const N=task.threshold||7;
    const card=document.createElement('div');
    card.className=`card ${cls}`;
    card.dataset.id=task.id;
    card.style.animationDelay=`${i*40}ms`;
    const daysDisplay=sec===null?'∞':days;
    const daysUnit=days<=1?'jour':'jours';
    card.innerHTML=`
      <div class="card-info">
        <div class="card-name">${escHtml(task.name)}</div>
        <div class="card-threshold">🟢 &lt;${N}j · 🟠 ${N}–${N*2}j · 🔴 &gt;${N*2}j</div>
      </div>
      <div class="card-actions">
        <button class="btn-delete" onclick="deleteTask('${task.id}')" aria-label="Supprimer">×</button>
        <button class="btn-done"   onclick="markDone('${task.id}')">C'est fait ✓</button>
      </div>
      <div class="card-time">
        <div class="days-row">
          <span class="days-number" data-field="days">${daysDisplay}</span>
          <span class="days-unit"   data-field="unit">${daysUnit}</span>
        </div>
        <span class="chrono" data-field="chrono">${formatChrono(sec)}</span>
      </div>
    `;
    return card;
  }

  function patchCard(task){
    const card=document.querySelector(`.card[data-id="${task.id}"]`);
    if(!card)return;
    const sec=secondsSince(task.lastDone);
    const days=daysFromSec(sec);
    const cls=urgencyClass(sec,task.threshold);
    card.className=card.className.replace(/\bu-\w+\b/g,'').trim()+' '+cls;
    const daysEl=card.querySelector('[data-field="days"]');
    const unitEl=card.querySelector('[data-field="unit"]');
    const chrEl=card.querySelector('[data-field="chrono"]');
    if(daysEl)daysEl.textContent=sec===null?'∞':days;
    if(unitEl)unitEl.textContent=days<=1?'jour':'jours';
    if(chrEl)chrEl.textContent=formatChrono(sec);
  }

  function tick(){
    if(tasks.length===0)return;
    const list=document.getElementById('task-list');
    const sorted=[...tasks].sort((a,b)=>{const sa=secondsSince(a.lastDone)??Infinity;const sb=secondsSince(b.lastDone)??Infinity;return sb-sa;});
    const existingIds=[...list.querySelectorAll('.card')].map(c=>c.dataset.id);
    const sortedIds=sorted.map(t=>t.id);
    if(JSON.stringify(existingIds)!==JSON.stringify(sortedIds)){render();}
    else{tasks.forEach(task=>patchCard(task));}
  }

  function markDone(id){
    const task=tasks.find(t=>t.id===id);
    if(!task)return;
    task.lastDone=new Date().toISOString();
    saveTasks();
    const card=document.querySelector(`.card[data-id="${id}"]`);
    if(card){card.classList.add('just-done');card.addEventListener('animationend',()=>render(),{once:true});}
    else render();
  }

  function deleteTask(id){
    const card=document.querySelector(`.card[data-id="${id}"]`);
    if(card){card.classList.add('removing');card.addEventListener('animationend',()=>{tasks=tasks.filter(t=>t.id!==id);saveTasks();render();},{once:true});}
  }

  const overlay=document.getElementById('modal-overlay');
  const nameInput=document.getElementById('new-task-input');
  const threshInput=document.getElementById('threshold-input');
  document.getElementById('fab').addEventListener('click',openModal);
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});

  function openModal(){overlay.classList.add('open');updatePills();setTimeout(()=>nameInput.focus(),350);}
  function closeModal(){overlay.classList.remove('open');nameInput.value='';threshInput.value=7;updatePills();}

  function updatePills(){
    const N=parseInt(threshInput.value)||7;
    document.getElementById('pill-green').textContent=`0–${N} j`;
    document.getElementById('pill-orange').textContent=`${N}–${N*2} j`;
    document.getElementById('pill-red').textContent=`>${N*2} j`;
    document.getElementById('ph-green').textContent=`0–${N} j`;
    document.getElementById('ph-orange').textContent=`${N}–${N*2} j`;
    document.getElementById('ph-red').textContent=`>${N*2} j`;
  }

  threshInput.addEventListener('input',updatePills);
  function fillSuggestion(el){nameInput.value=el.textContent;nameInput.focus();}

  function confirmAdd(){
    const name=nameInput.value.trim();
    if(!name){nameInput.focus();return;}
    if(tasks.find(t=>t.name.toLowerCase()===name.toLowerCase())){
      nameInput.style.borderColor='var(--red)';
      setTimeout(()=>nameInput.style.borderColor='',800);return;
    }
    const threshold=Math.max(1,parseInt(threshInput.value)||7);
    tasks.push({id:uid(),name,threshold,lastDone:null});
    saveTasks();closeModal();render();
  }

  nameInput.addEventListener('keydown',e=>{if(e.key==='Enter')confirmAdd();if(e.key==='Escape')closeModal();});

  loadTasks();render();
  setInterval(tick,1000);

  if('serviceWorker' in navigator){
    const sw=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>clients.claim());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))));`;
    const swBlob=new Blob([sw],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
  }
</script>
</body>
</html>
